name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Presets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Validate preset files
        shell: bash {0}
        run: |
          EXIT_CODE=0
          for f in *.json; do
            [ "$f" = "renovate.json" ] && continue
            echo "Validating ${f}..."
            OUTPUT=$(npx --yes renovate-config-validator --strict --no-global "${f}" 2>&1)
            VALIDATOR_EXIT_CODE=$?
            printf '%s\n' "$OUTPUT" | grep -v "^npm warn" || true
            if [ "$VALIDATOR_EXIT_CODE" -ne 0 ]; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Validate repo config
        shell: bash {0}
        run: |
          echo "Validating renovate.json..."
          OUTPUT=$(npx --yes renovate-config-validator 2>&1)
          VALIDATOR_EXIT_CODE=$?
          printf '%s\n' "$OUTPUT" | grep -v "^npm warn" || true
          exit $VALIDATOR_EXIT_CODE
